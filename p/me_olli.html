const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', hash: 'SHA-256', salt: b64(D.salt), iterations: D.iter },
    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(D.iv) }, key, b64(D.ct));
  return new TextDecoder().decode(pt);
}

async function attempt(pw) {

  busy = true; field.disabled = true; form.classList.remove('err');
  try {
    const html = await unlock(pw);
    try {  // Chrome-family: store the shared passphrase without relying on save-prompt heuristics
      if (window.PasswordCredential) navigator.credentials.store(new PasswordCredential({ id: 'reader', password: pw }));

    document.open(); document.write(html); document.close();
  } catch (e) {
    void form.offsetWidth; form.classList.add('err');
    field.disabled = false; field.select(); field.focus();
  }

form.addEventListener('submit', e => { e.preventDefault(); attempt(field.value); });
field.addEventListener('keydown', () => { typed = true; });

  const autofill = () => { if (!typed && !busy && field.value) attempt(field.value); };

  document.addEventListener('pointerdown', autofill, { once: true });
}
