<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aumann</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js" defer></script>
    <script type="module" src="js/main.js" defer></script>
</head>
<body>

<main>

<!-- ============ LANDING ============ -->
<section id="landing" class="view">
    <h1>Aumann <span class="help title-help" data-tooltip="Two-player Bayesian agreement game. Each player gets 5 hidden cards; together you estimate the probability that the combined 10-card hand satisfies any of 3 random conditions. From Maailmantutkija ch. 11.4.">?</span></h1>

    <div class="form-row">
        <input id="name" type="text" maxlength="24" autocomplete="off" placeholder="Your name">
    </div>

    <button id="btn-create" class="primary">Start a room</button>

    <div id="lobby-list" class="lobby">
        <div class="lobby-label">Or join a room:</div>
        <div id="lobby-rooms" class="lobby-rooms"></div>
        <div id="lobby-empty" class="lobby-empty muted">No open rooms yet.</div>
    </div>

    <div id="my-stats" class="stats-block" hidden></div>
    <div id="error-msg" class="error" hidden></div>
</section>

<!-- ============ WAITING ============ -->
<section id="waiting" class="view" hidden>
    <h1>Waiting for someone to join…</h1>
    <p class="muted">Your room appears in the list at <strong>ollij.fi/aumann</strong>.</p>
    <button id="btn-leave-waiting" class="ghost">Leave</button>
</section>

<!-- ============ GAME ============ -->
<section id="game" class="view" hidden>

    <button id="btn-leave-game" class="leave-link" title="Leave the room">← leave</button>

    <div class="game-layout">
        <div class="game-main">

            <!-- Conditions (compact icon style). -->
            <div id="conditions-row" class="conditions-row"></div>

            <!-- Opponent's hand: same fanned style as yours. -->
            <div id="opp-hand" class="hand opp-hand fan"></div>

            <!-- Status text. -->
            <div id="status" class="status"></div>

            <!-- 3×5 board grid (heavy B&W). -->
            <div id="board-wrap" class="board-wrap">
                <div id="board" class="board"></div>
                <!-- SVG arc below the grid for Bayesian visualization. -->
                <svg id="bayes-arc" class="bayes-arc" hidden xmlns="http://www.w3.org/2000/svg"></svg>
            </div>

            <!-- Your hand: large fanned. -->
            <div id="my-hand" class="hand my-hand fan"></div>

            <!-- Reveal panel. -->
            <div id="reveal" class="reveal" hidden>
                <div id="reveal-q" class="reveal-q"></div>
                <div id="reveal-team" class="reveal-team"></div>
                <button id="btn-next-game" class="primary">Next game</button>
            </div>

        </div><!-- /.game-main -->

        <aside class="game-sidebar">
            <div class="sb-title">
                Scores
                <span class="help sb-help" data-tooltip="Hover the table to see what perfect Bayesians would have scored on the same hands.">?</span>
            </div>
            <div id="score-table-wrap" class="score-table-wrap">
                <!-- Realized score table (always visible). On hover, the
                     Bayesian table fades in over it. -->
                <table id="score-table-real" class="score-table"></table>
                <table id="score-table-ideal" class="score-table ideal-table"></table>
            </div>
        </aside>

    </div>
</section>

</main>

</body>
</html>
