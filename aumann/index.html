<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aumann</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js" defer></script>
    <script type="module" src="js/main.js" defer></script>
</head>
<body>

<main>

<!-- Landing: name field, "Start a room" button, and live list of open rooms. -->
<section id="landing" class="view">
    <h1>Aumann <span class="help title-help" data-tooltip="Two-player Bayesian agreement game. Each player gets 5 hidden cards; together you estimate the probability that the combined 10-card hand satisfies any of 3 random conditions. From Maailmantutkija ch. 11.4.">?</span></h1>

    <div class="form-row">
        <input id="name" type="text" maxlength="24" autocomplete="off" placeholder="Your name">
    </div>

    <button id="btn-create" class="primary">Start a room</button>

    <div id="lobby-list" class="lobby">
        <div class="lobby-label">Or join a room:</div>
        <div id="lobby-rooms" class="lobby-rooms"></div>
        <div id="lobby-empty" class="lobby-empty muted">No open rooms yet.</div>
    </div>

    <div id="my-stats" class="stats-block" hidden></div>
    <div id="error-msg" class="error" hidden></div>
</section>

<!-- Waiting: your room is created, no one's joined yet. -->
<section id="waiting" class="view" hidden>
    <h1>Waiting for someone to join…</h1>
    <p class="muted">Your room appears in the list at <strong>ollij.fi/aumann</strong>.</p>
    <button id="btn-leave-waiting" class="ghost">Leave</button>
</section>

<!-- Game: minimal chrome. -->
<section id="game" class="view" hidden>

    <!-- Discrete leave-room link in the corner. -->
    <button id="btn-leave-game" class="leave-link" title="Leave the room">← leave</button>

    <!-- 3 conditions as cards. -->
    <div id="conditions-row" class="conditions-row"></div>

    <!-- Opponent's hand: 5 backs, small. -->
    <div id="opp-hand" class="opp-hand"></div>

    <!-- Status: one short line. -->
    <div id="status" class="status"></div>

    <!-- Horizontal board: 5 columns (bands), 2 rows (you on top, opp under). -->
    <div id="board" class="board"></div>

    <!-- Your hand: 5 fanned cards, large. -->
    <div id="my-hand" class="my-hand fan"></div>

    <!-- Reveal panel — shown only when game state = revealed. -->
    <div id="reveal" class="reveal" hidden>
        <div id="reveal-q" class="reveal-q"></div>
        <div id="reveal-scores" class="reveal-scores"></div>
        <button id="btn-next-game" class="primary">Next game</button>
        <div id="reveal-details" class="reveal-details muted"></div>
    </div>

    <div id="session-stats" class="stats-block"></div>
</section>

</main>

</body>
</html>
